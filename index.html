<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Yas ❤️</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #fff7fa, #ffe8f0, #fff3f7);
      color: #4a1f2c;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    .floating-heart {
      position: fixed;
      font-size: 20px;
      opacity: 0.12;
      pointer-events: none;
      animation: floatHeart 8s ease-in-out infinite;
    }

    .heart1 { top: 10%; left: 8%; }
    .heart2 { top: 20%; right: 10%; }
    .heart3 { bottom: 12%; left: 12%; }
    .heart4 { bottom: 18%; right: 14%; }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 28px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 22px 70px rgba(109, 27, 55, 0.14);
      border: 1px solid rgba(255,255,255,0.7);
      animation: fadeUp 1s ease;
      position: relative;
      z-index: 1;
    }

    .top-heart {
      font-size: 34px;
      margin-bottom: 12px;
      animation: pulse 2s infinite ease-in-out;
    }

    .photo-wrap {
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.10);
    }

    img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      object-position: 50% 30%;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1rem;
      color: #8b4a62;
      font-style: italic;
      margin-bottom: 20px;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(to right, transparent, #d87aa0, transparent);
      margin: 20px auto;
    }

    p {
      line-height: 1.8;
      font-size: 1.1rem;
      margin: 14px 0;
    }

    .highlight {
      color: #c0396b;
      font-weight: bold;
    }

    .btn {
      margin-top: 20px;
      padding: 14px 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, #c0396b, #e05686);
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(192, 57, 107, 0.25);
    }

    .final {
      margin-top: 20px;
      opacity: 0;
      transition: 0.4s;
    }

    .final.show {
      opacity: 1;
    }

    .love-box {
      display: none;
      margin-top: 24px;
      padding: 20px;
      border-radius: 16px;
      background: #fff6f9;
      border: 1px solid #f4d7e3;
      position: relative;
    }

    .love-box.show {
      display: block;
    }

    .buttons-area {
      position: relative;
      height: 100px;
    }

    .love-btn {
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .yes-btn {
      background: #c0396b;
      color: white;
    }

    .no-btn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 1px solid #f0c2d5;
    }

    .answer {
      margin-top: 16px;
      font-style: italic;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      50% { transform: scale(1.1); }
    }

    @keyframes floatHeart {
      50% { transform: translateY(-12px); }
    }

    @media (max-width: 640px) {
      img { height: 360px; }
    }
  </style>
</head>

<body>

<div class="floating-heart heart1">❤</div>
<div class="floating-heart heart2">❤</div>
<div class="floating-heart heart3">❤</div>
<div class="floating-heart heart4">❤</div>

<div class="card">

  <div class="top-heart">❤️</div>

  <div class="photo-wrap">
    <img src="Yasmin.jpeg" />
  </div>

  <h1>Para você, Yas ❤️</h1>
  <div class="subtitle">uma pequena surpresa</div>

  <div class="divider"></div>

  <p>
    Você é especial de um jeito que não se explica fácil.
  </p>

  <p>
    Tem algo no seu jeito que prende atenção, acalma e ao mesmo tempo desperta algo bom.
  </p>

  <p>
    Sou muito grato a Deus por estar vivendo isso com você.
  </p>

  <p>
    <span class="highlight">Eu amo você ❤️</span>
  </p>

  <button class="btn" onclick="iniciar()">Clique aqui 💌</button>

  <p id="final" class="final"></p>

  <div id="loveBox" class="love-box">
    <p><strong>Você me ama? 😌</strong></p>

    <div class="buttons-area">
      <button class="love-btn yes-btn" onclick="sim()">Sim ❤️</button>
      <button class="love-btn no-btn" id="noBtn">Não 😅</button>
    </div>

    <div id="answer" class="answer"></div>
  </div>

</div>

<script>
function iniciar() {
  document.getElementById("final").innerText =
    "Com carinho, de alguém que pensa em você todos os dias ❤️";

  document.getElementById("final").classList.add("show");
  document.getElementById("loveBox").classList.add("show");
}

function sim() {
  document.getElementById("answer").innerText =
    "Se prepara que nosso fds ta chegando... 😏❤️";
}

const noBtn = document.getElementById("noBtn");

function fugir() {
  const x = Math.random() * 200 - 100;
  const y = Math.random() * 60;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

noBtn.addEventListener("mouseenter", fugir);
noBtn.addEventListener("touchstart", fugir);
noBtn.addEventListener("click", fugir);
</script>

</body>
</html>
